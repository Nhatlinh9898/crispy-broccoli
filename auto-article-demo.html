<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Tạo Bài viết Tự động - Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .article-content {
            line-height: 1.8;
            font-size: 16px;
        }
        
        .article-content h2 {
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
            font-weight: 700;
            color: #1f2937;
        }
        
        .article-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #374151;
        }
        
        .article-content p {
            margin-bottom: 1.25rem;
            color: #4b5563;
        }
        
        .article-content ul, .article-content ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }
        
        .article-content li {
            margin-bottom: 0.5rem;
            color: #4b5563;
        }
        
        .article-content blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #6b7280;
        }
        
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }
        
        .article-content th, .article-content td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
        }
        
        .article-content th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        
        .spec-highlight {
            background-color: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 0.375rem;
            padding: 1rem;
            margin: 1rem 0;
        }
        
        .application-card {
            background-color: #f0f9ff;
            border: 1px solid #0ea5e9;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
        }
        
        .toc {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .toc ul {
            list-style-type: none;
            padding-left: 0;
        }
        
        .toc li {
            margin-bottom: 0.5rem;
        }
        
        .toc a {
            color: #3b82f6;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .toc a:hover {
            color: #2563eb;
            text-decoration: underline;
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .product-card {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }
        
        .template-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-robot text-blue-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold text-gray-800">Hệ thống Tạo Bài viết Tự động</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="clearCache()" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">
                        <i class="fas fa-trash mr-2"></i>Xóa Cache
                    </button>
                    <button onclick="generateAllArticles()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-magic mr-2"></i>Tạo Tất cả
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 flex flex-col items-center">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-700">Đang tạo bài viết...</p>
            <p id="loadingProgress" class="text-sm text-gray-500 mt-2"></p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- System Info -->
        <div class="bg-white rounded-lg p-6 shadow-lg mb-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fas fa-info-circle text-blue-500 mr-2"></i>Thông tin Hệ thống
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="text-center">
                    <div class="text-2xl font-bold text-blue-600" id="templateCount">4</div>
                    <div class="text-sm text-gray-600">Templates</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-green-600" id="productCount">5</div>
                    <div class="text-sm text-gray-600">Sản phẩm</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-purple-600" id="generatedCount">0</div>
                    <div class="text-sm text-gray-600">Đã tạo</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-orange-600" id="cacheSize">0</div>
                    <div class="text-sm text-gray-600">Cache</div>
                </div>
            </div>
        </div>

        <!-- Product Selection -->
        <div class="bg-white rounded-lg p-6 shadow-lg mb-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fas fa-box text-green-500 mr-2"></i>Chọn Sản phẩm
            </h2>
            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Products will be loaded here -->
            </div>
        </div>

        <!-- Generated Article Display -->
        <div id="articleDisplay" class="hidden">
            <div class="bg-white rounded-lg shadow-lg">
                <div class="p-6 border-b">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold text-gray-800" id="articleTitle">
                            <!-- Article title will be displayed here -->
                        </h2>
                        <div class="flex space-x-2">
                            <span id="articleType" class="template-badge bg-blue-100 text-blue-800">
                                <!-- Article type will be displayed here -->
                            </span>
                            <button onclick="exportArticle()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                                <i class="fas fa-download mr-2"></i>Xuất
                            </button>
                            <button onclick="printArticle()" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">
                                <i class="fas fa-print mr-2"></i>In
                            </button>
                        </div>
                    </div>
                    <p class="text-gray-600 mt-2" id="articleSubtitle">
                        <!-- Article subtitle will be displayed here -->
                    </p>
                </div>
                
                <div class="p-6">
                    <!-- Table of Contents -->
                    <div id="tableOfContents" class="toc">
                        <h3 class="text-lg font-semibold mb-3 text-gray-800">
                            <i class="fas fa-list mr-2"></i>Mục lục
                        </h3>
                        <ul id="tocList">
                            <!-- TOC items will be generated here -->
                        </ul>
                    </div>
                    
                    <!-- Article Content -->
                    <div id="articleContent" class="article-content">
                        <!-- Article content will be displayed here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="article-generator.js"></script>
    <script>
        // Global variables
        let articleGenerator = null;
        let productData = null;
        let currentArticle = null;
        let generatedArticles = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeSystem();
        });

        // Initialize the system
        async function initializeSystem() {
            try {
                // Initialize article generator
                articleGenerator = new ArticleGenerator();
                const initialized = await articleGenerator.initialize();
                
                if (!initialized) {
                    throw new Error('Failed to initialize article generator');
                }
                
                // Load product data
                const response = await fetch('ecommerce-products.json');
                productData = await response.json();
                
                // Update system info
                updateSystemInfo();
                
                // Load product grid
                loadProductGrid();
                
                console.log('System initialized successfully');
            } catch (error) {
                console.error('Failed to initialize system:', error);
                showError('Không thể khởi tạo hệ thống. Vui lòng kiểm tra lại các file dữ liệu.');
            }
        }

        // Update system information
        function updateSystemInfo() {
            if (articleGenerator) {
                const templateTypes = articleGenerator.getAvailableTemplateTypes();
                document.getElementById('templateCount').textContent = templateTypes.length;
            }
            
            if (productData) {
                document.getElementById('productCount').textContent = productData.products.length;
            }
            
            updateCacheInfo();
        }

        // Update cache information
        function updateCacheInfo() {
            if (articleGenerator) {
                const cacheStats = articleGenerator.getCacheStats();
                document.getElementById('cacheSize').textContent = cacheStats.size;
                document.getElementById('generatedCount').textContent = generatedArticles.length;
            }
        }

        // Load product grid
        function loadProductGrid() {
            const gridDiv = document.getElementById('productGrid');
            
            const productsHTML = productData.products.map(product => {
                const productType = articleGenerator.determineProductType(product);
                const typeColors = {
                    'bolt': 'bg-blue-100 text-blue-800',
                    'resistor': 'bg-green-100 text-green-800',
                    'bearing': 'bg-purple-100 text-purple-800',
                    'electronic': 'bg-yellow-100 text-yellow-800',
                    'mechanical': 'bg-red-100 text-red-800',
                    'generic': 'bg-gray-100 text-gray-800'
                };
                
                const colorClass = typeColors[productType] || typeColors.generic;
                const isGenerated = generatedArticles.includes(product.id || product.sku);
                
                return `
                    <div class="product-card bg-white rounded-lg p-4 cursor-pointer ${isGenerated ? 'border-green-500' : ''}" 
                         onclick="generateArticleForProduct('${product.id || product.sku}')">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-semibold text-gray-800">${product.name}</h3>
                                <p class="text-sm text-gray-500">${product.sku}</p>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="template-badge ${colorClass} text-xs">
                                    ${productType}
                                </span>
                                ${isGenerated ? '<i class="fas fa-check-circle text-green-500"></i>' : ''}
                            </div>
                        </div>
                        
                        <div class="text-sm text-gray-600 mb-3">
                            <p><strong>Danh mục:</strong> ${product.category}</p>
                            <p><strong>Nhà SX:</strong> ${product.brand || 'N/A'}</p>
                            <p><strong>Giá:</strong> ${product.pricing?.retail_price || 'N/A'} VND</p>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <div class="text-xs text-gray-500">
                                ${product.inventory?.in_stock || 0} trong kho
                            </div>
                            <button class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition">
                                <i class="fas fa-file-alt mr-1"></i>Tạo bài viết
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            gridDiv.innerHTML = productsHTML;
        }

        // Generate article for specific product
        async function generateArticleForProduct(productId) {
            try {
                showLoading(`Đang tạo bài viết cho ${productId}...`);
                
                // Generate article
                const article = await articleGenerator.generateArticleById(productId);
                currentArticle = article;
                
                // Add to generated articles list
                if (!generatedArticles.includes(productId)) {
                    generatedArticles.push(productId);
                }
                
                // Display article
                displayArticle(article);
                
                // Update UI
                updateSystemInfo();
                loadProductGrid();
                
                hideLoading();
                
                // Scroll to article
                document.getElementById('articleDisplay').scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                console.error('Error generating article:', error);
                hideLoading();
                showError(`Không thể tạo bài viết: ${error.message}`);
            }
        }

        // Display article
        function displayArticle(article) {
            const displayDiv = document.getElementById('articleDisplay');
            
            // Update article header
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleSubtitle').textContent = article.subtitle;
            document.getElementById('articleType').textContent = article.product_type.toUpperCase();
            document.getElementById('articleType').className = `template-badge bg-blue-100 text-blue-800`;
            
            // Generate table of contents
            const tocList = document.getElementById('tocList');
            const tocHTML = article.table_of_contents.map(item => `
                <li>
                    <a href="#${item.id}">${item.title}</a>
                </li>
            `).join('');
            tocList.innerHTML = tocHTML;
            
            // Display article content
            document.getElementById('articleContent').innerHTML = article.content;
            
            // Show article display
            displayDiv.classList.remove('hidden');
        }

        // Generate all articles
        async function generateAllArticles() {
            try {
                showLoading('Đang tạo tất cả bài viết...');
                
                const totalProducts = productData.products.length;
                let generatedCount = 0;
                
                for (const product of productData.products) {
                    try {
                        const productId = product.id || product.sku;
                        await articleGenerator.generateArticleById(productId);
                        
                        if (!generatedArticles.includes(productId)) {
                            generatedArticles.push(productId);
                        }
                        
                        generatedCount++;
                        updateLoadingProgress(`Đã tạo ${generatedCount}/${totalProducts} bài viết...`);
                        
                    } catch (error) {
                        console.error(`Error generating article for ${product.id || product.sku}:`, error);
                    }
                }
                
                hideLoading();
                updateSystemInfo();
                loadProductGrid();
                
                showSuccess(`Đã tạo thành công ${generatedCount}/${totalProducts} bài viết!`);
                
            } catch (error) {
                console.error('Error generating all articles:', error);
                hideLoading();
                showError(`Không thể tạo tất cả bài viết: ${error.message}`);
            }
        }

        // Clear cache
        function clearCache() {
            if (articleGenerator) {
                articleGenerator.clearCache();
                generatedArticles = [];
                currentArticle = null;
                
                updateSystemInfo();
                loadProductGrid();
                
                document.getElementById('articleDisplay').classList.add('hidden');
                
                showSuccess('Đã xóa cache và đặt lại hệ thống!');
            }
        }

        // Export article
        function exportArticle() {
            if (!currentArticle) {
                showError('Không có bài viết để xuất');
                return;
            }
            
            const articleData = {
                title: currentArticle.title,
                subtitle: currentArticle.subtitle,
                content: currentArticle.content,
                product_id: currentArticle.product_id,
                product_name: currentArticle.product_name,
                product_type: currentArticle.product_type,
                generated_at: currentArticle.generated_at
            };
            
            const dataStr = JSON.stringify(articleData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `article-${currentArticle.product_id}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        // Print article
        function printArticle() {
            if (!currentArticle) {
                showError('Không có bài viết để in');
                return;
            }
            
            window.print();
        }

        // Show loading
        function showLoading(message = 'Đang xử lý...') {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            updateLoadingProgress(message);
        }

        // Update loading progress
        function updateLoadingProgress(message) {
            document.getElementById('loadingProgress').textContent = message;
        }

        // Hide loading
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // Show success message
        function showSuccess(message) {
            // Create success notification
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            notification.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Remove after 3 seconds
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Show error message
        function showError(message) {
            // Create error notification
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            notification.innerHTML = `
                <div class="flex items-center">
                    <i class="fas fa-exclamation-triangle mr-2"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            // Remove after 5 seconds
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }
    </script>
</body>
</html>
