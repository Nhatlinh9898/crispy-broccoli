<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Linh kiện - Hệ thống Phân loại</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tab-active {
            border-bottom: 3px solid #3B82F6;
            color: #3B82F6;
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .spec-table th {
            background-color: #f3f4f6;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Back Button -->
    <div class="back-button">
        <button onclick="goBack()" class="bg-white rounded-lg shadow-lg px-4 py-2 hover:bg-gray-100 transition">
            <i class="fas fa-arrow-left mr-2"></i>Quay lại
        </button>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-cogs text-blue-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold text-gray-800">Chi tiết Linh kiện</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="printDetail()" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition">
                        <i class="fas fa-print mr-2"></i>In
                    </button>
                    <button onclick="exportDetail()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-download mr-2"></i>Xuất
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 flex flex-col items-center">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-700">Đang tải thông tin linh kiện...</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Product Header -->
        <div id="productHeader" class="bg-white rounded-lg p-6 card-shadow mb-6">
            <!-- Content will be dynamically loaded -->
        </div>

        <!-- Detail Tabs -->
        <div class="bg-white rounded-lg shadow-md mb-6">
            <div class="border-b">
                <nav class="flex space-x-8 px-6">
                    <button onclick="switchDetailTab('basic')" id="tab-basic" class="py-4 px-2 border-b-2 font-medium text-sm tab-active">
                        <i class="fas fa-info-circle mr-2"></i>Thông tin cơ bản
                    </button>
                    <button onclick="switchDetailTab('specifications')" id="tab-specifications" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-clipboard-list mr-2"></i>Thông số kỹ thuật
                    </button>
                    <button onclick="switchDetailTab('images')" id="tab-images" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-images mr-2"></i>Hình ảnh
                    </button>
                    <button onclick="switchDetailTab('related')" id="tab-related" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-link mr-2"></i>Linh kiện liên quan
                    </button>
                    <button onclick="switchDetailTab('history')" id="tab-history" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-history mr-2"></i>Lịch sử
                    </button>
                </nav>
            </div>
        </div>

        <!-- Tab Content -->
        <div id="detail-content-area">
            <!-- Basic Information Tab -->
            <div id="basic-content" class="tab-content fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-tag text-blue-500 mr-2"></i>Thông tin định danh
                        </h3>
                        <div id="basicInfo" class="space-y-4">
                            <!-- Content will be dynamically loaded -->
                        </div>
                    </div>

                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-sitemap text-green-500 mr-2"></i>Phân loại
                        </h3>
                        <div id="classificationInfo" class="space-y-4">
                            <!-- Content will be dynamically loaded -->
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg p-6 card-shadow mt-6">
                    <h3 class="text-xl font-bold mb-4 text-gray-800">
                        <i class="fas fa-align-left text-purple-500 mr-2"></i>Mô tả chi tiết
                    </h3>
                    <div id="descriptionInfo">
                        <!-- Content will be dynamically loaded -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="data-processor.js"></script>
    <script>
        // Global variables
        let currentPartCode = '';
        let currentPartData = null;
        let currentDetailTab = 'basic';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Get part code from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            currentPartCode = urlParams.get('code') || '';
            
            if (currentPartCode) {
                loadPartDetail(currentPartCode);
            } else {
                showError('Không tìm thấy mã linh kiện');
            }
        });

        // Load part detail
        async function loadPartDetail(partCode) {
            showLoading();
            
            try {
                // Ensure data is processed
                if (!window.dataProcessor || !window.dataProcessor.processedData.partsTree.length) {
                    await window.dataProcessor.processAllData();
                }
                
                // Find part data
                currentPartData = window.dataProcessor.processedData.partsTree.find(
                    part => part.code === partCode
                );
                
                if (currentPartData) {
                    updateProductHeader();
                    loadDetailTabContent('basic');
                } else {
                    showError(`Không tìm thấy linh kiện với mã: ${partCode}`);
                }
            } catch (error) {
                console.error('Error loading part detail:', error);
                showError('Lỗi khi tải thông tin linh kiện');
            } finally {
                hideLoading();
            }
        }

        // Update product header
        function updateProductHeader() {
            const headerDiv = document.getElementById('productHeader');
            
            headerDiv.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <div class="flex items-center space-x-4 mb-2">
                            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">
                                ${currentPartData.code || 'N/A'}
                            </span>
                            <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium">
                                ${currentPartData.category || 'Chưa phân loại'}
                            </span>
                            ${currentPartData.subcategory ? `
                                <span class="bg-gray-100 text-gray-800 px-3 py-1 rounded-full text-sm">
                                    ${currentPartData.subcategory}
                                </span>
                            ` : ''}
                        </div>
                        <h2 class="text-3xl font-bold text-gray-800 mb-2">
                            ${currentPartData.name || 'Tên không xác định'}
                        </h2>
                        <p class="text-gray-600">
                            ${currentPartData.specification || 'Chưa có thông số kỹ thuật'}
                        </p>
                    </div>
                    <div class="text-right">
                        <div class="text-sm text-gray-500 mb-1">Cập nhật lần cuối</div>
                        <div class="text-lg font-semibold text-gray-700">
                            ${currentPartData.lastUpdated || '26/07/2022'}
                        </div>
                    </div>
                </div>
            `;
        }

        // Switch detail tab
        function switchDetailTab(tabName) {
            // Update tab styles
            document.querySelectorAll('[id^="tab-"]').forEach(tab => {
                tab.classList.remove('tab-active');
                tab.classList.add('text-gray-500');
            });
            
            document.getElementById(`tab-${tabName}`).classList.add('tab-active');
            document.getElementById(`tab-${tabName}`).classList.remove('text-gray-500');
            
            // Update content
            currentDetailTab = tabName;
            loadDetailTabContent(tabName);
        }

        // Load detail tab content
        function loadDetailTabContent(tabName) {
            const contentArea = document.getElementById('detail-content-area');
            
            switch(tabName) {
                case 'basic':
                    contentArea.innerHTML = getBasicInfoContent();
                    break;
                case 'specifications':
                    contentArea.innerHTML = getSpecificationsContent();
                    break;
                case 'images':
                    contentArea.innerHTML = getImagesContent();
                    break;
                case 'related':
                    contentArea.innerHTML = getRelatedContent();
                    break;
                case 'history':
                    contentArea.innerHTML = getHistoryContent();
                    break;
            }
        }

        // Basic information content
        function getBasicInfoContent() {
            return `
                <div class="fade-in">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white rounded-lg p-6 card-shadow">
                            <h3 class="text-xl font-bold mb-4 text-gray-800">
                                <i class="fas fa-tag text-blue-500 mr-2"></i>Thông tin định danh
                            </h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Mã linh kiện:</span>
                                    <span class="font-semibold">${currentPartData.code || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Tên linh kiện:</span>
                                    <span class="font-semibold">${currentPartData.name || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Tên tiếng Nhật (Furigana):</span>
                                    <span class="font-semibold">${getFuriganaName() || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Trạng thái:</span>
                                    <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm">Hoạt động</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-lg p-6 card-shadow">
                            <h3 class="text-xl font-bold mb-4 text-gray-800">
                                <i class="fas fa-sitemap text-green-500 mr-2"></i>Phân loại
                            </h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Danh mục chính:</span>
                                    <span class="font-semibold">${currentPartData.category || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Danh mục con:</span>
                                    <span class="font-semibold">${currentPartData.subcategory || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Nhóm sản phẩm:</span>
                                    <span class="font-semibold">${getProductGroup() || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center py-2 border-b">
                                    <span class="text-gray-600">Loại vật liệu:</span>
                                    <span class="font-semibold">${getMaterialType() || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg p-6 card-shadow mt-6">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-align-left text-purple-500 mr-2"></i>Mô tả chi tiết
                        </h3>
                        <div class="prose max-w-none">
                            <p class="text-gray-700 leading-relaxed">
                                ${currentPartData.description || 'Chưa có mô tả chi tiết cho linh kiện này. ' +
                                  'Linh kiện này thuộc danh mục ' + (currentPartData.category || 'chưa xác định') + 
                                  ' với các thông số kỹ thuật cơ bản đã được đăng ký trong hệ thống.'}
                            </p>
                            
                            ${currentPartData.specification ? `
                                <div class="mt-4 p-4 bg-blue-50 rounded-lg">
                                    <h4 class="font-semibold text-blue-800 mb-2">Thông số kỹ thuật cơ bản:</h4>
                                    <p class="text-blue-700">${currentPartData.specification}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Specifications content
        function getSpecificationsContent() {
            return `
                <div class="fade-in">
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-clipboard-list text-orange-500 mr-2"></i>Thông số kỹ thuật chi tiết
                        </h3>
                        
                        <div class="overflow-x-auto">
                            <table class="min-w-full spec-table">
                                <thead>
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Thuộc tính</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Giá trị</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Đơn vị</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ghi chú</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Mã linh kiện</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${currentPartData.code || 'N/A'}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">-</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Mã định danh duy nhất</td>
                                    </tr>
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Quy cách cơ bản</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${currentPartData.specification || 'N/A'}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">-</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Thông số tiêu chuẩn</td>
                                    </tr>
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Phân loại</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${currentPartData.category || 'N/A'}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">-</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Danh mục chính</td>
                                    </tr>
                                    ${getAdditionalSpecifications()}
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-gray-50 rounded-lg p-4">
                                <h4 class="font-semibold text-gray-700 mb-3">Tiêu chuẩn áp dụng</h4>
                                <ul class="space-y-2">
                                    <li class="flex items-center text-sm text-gray-600">
                                        <i class="fas fa-check-circle text-green-500 mr-2"></i>
                                        JIS B1181 - Tiêu chuẩn bu lông lục giác
                                    </li>
                                    <li class="flex items-center text-sm text-gray-600">
                                        <i class="fas fa-check-circle text-green-500 mr-2"></i>
                                        ISO 4017 - Tiêu chuẩn quốc tế
                                    </li>
                                </ul>
                            </div>
                            
                            <div class="bg-gray-50 rounded-lg p-4">
                                <h4 class="font-semibold text-gray-700 mb-3">Vật liệu</h4>
                                <ul class="space-y-2">
                                    <li class="flex items-center text-sm text-gray-600">
                                        <i class="fas fa-circle text-blue-500 mr-2"></i>
                                        Thép không gỉ SUS304
                                    </li>
                                    <li class="flex items-center text-sm text-gray-600">
                                        <i class="fas fa-circle text-gray-500 mr-2"></i>
                                        Lớp phủ kẽm nóng
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Images content
        function getImagesContent() {
            return `
                <div class="fade-in">
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-images text-indigo-500 mr-2"></i>Hình ảnh linh kiện
                        </h3>
                        
                        <div class="image-gallery">
                            ${generateProductImages()}
                        </div>
                        
                        <div class="mt-6 p-4 bg-blue-50 rounded-lg">
                            <p class="text-blue-700 text-sm">
                                <i class="fas fa-info-circle mr-2"></i>
                                Hình ảnh được cung cấp để tham khảo. Kích thước và màu sắc có thể khác nhau tùy thuộc vào thiết bị hiển thị.
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        // Related parts content
        function getRelatedContent() {
            const relatedParts = getRelatedParts();
            
            return `
                <div class="fade-in">
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-link text-green-500 mr-2"></i>Linh kiện liên quan
                        </h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${relatedParts.map(part => `
                                <div class="border rounded-lg p-4 hover:bg-gray-50 cursor-pointer" onclick="viewPartDetail('${part.code}')">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium">
                                            ${part.code}
                                        </span>
                                        <span class="text-xs text-gray-500">${part.category}</span>
                                    </div>
                                    <h4 class="font-semibold text-gray-800 mb-1">${part.name}</h4>
                                    <p class="text-sm text-gray-600">${part.specification || 'Không có thông số'}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // History content
        function getHistoryContent() {
            return `
                <div class="fade-in">
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-history text-yellow-500 mr-2"></i>Lịch sử thay đổi
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="flex items-start space-x-4 p-4 border-l-4 border-blue-500 bg-blue-50">
                                <div class="flex-shrink-0">
                                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white">
                                        <i class="fas fa-plus text-sm"></i>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center justify-between">
                                        <h4 class="font-semibold text-gray-800">Đăng ký linh kiện mới</h4>
                                        <span class="text-sm text-gray-500">26/07/2022</span>
                                    </div>
                                    <p class="text-gray-600 text-sm mt-1">
                                        Linh kiện được đăng ký lần đầu vào hệ thống với mã ${currentPartData.code}
                                    </p>
                                </div>
                            </div>
                            
                            <div class="flex items-start space-x-4 p-4 border-l-4 border-green-500 bg-green-50">
                                <div class="flex-shrink-0">
                                    <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white">
                                        <i class="fas fa-edit text-sm"></i>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center justify-between">
                                        <h4 class="font-semibold text-gray-800">Cập nhật thông số kỹ thuật</h4>
                                        <span class="text-sm text-gray-500">25/07/2022</span>
                                    </div>
                                    <p class="text-gray-600 text-sm mt-1">
                                        Cập nhật thông số kỹ thuật và tiêu chuẩn áp dụng
                                    </p>
                                </div>
                            </div>
                            
                            <div class="flex items-start space-x-4 p-4 border-l-4 border-yellow-500 bg-yellow-50">
                                <div class="flex-shrink-0">
                                    <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-white">
                                        <i class="fas fa-tags text-sm"></i>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center justify-between">
                                        <h4 class="font-semibold text-gray-800">Phân loại lại</h4>
                                        <span class="text-sm text-gray-500">20/07/2022</span>
                                    </div>
                                    <p class="text-gray-600 text-sm mt-1">
                                        Thay đổi phân loại từ "Linh kiện khác" sang "${currentPartData.category}"
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Helper functions
        function getFuriganaName() {
            // Get furigana name from nameIndex
            if (window.dataProcessor && window.dataProcessor.processedData.nameIndex) {
                const nameIndex = window.dataProcessor.processedData.nameIndex.find(
                    item => item.partCode === currentPartCode
                );
                return nameIndex ? nameIndex.furigana : '';
            }
            return '';
        }

        function getProductGroup() {
            // Determine product group based on category
            const category = currentPartData.category || '';
            if (category.includes('機械') || category.includes('cơ khí')) return 'Linh kiện cơ khí';
            if (category.includes('電子') || category.includes('điện tử')) return 'Linh kiện điện tử';
            if (category.includes('構造') || category.includes('kết cấu')) return 'Linh kiện kết cấu';
            return 'Khác';
        }

        function getMaterialType() {
            // Determine material type based on part name or specification
            const name = (currentPartData.name || '').toLowerCase();
            const spec = (currentPartData.specification || '').toLowerCase();
            
            if (name.includes('ボルト') || name.includes('bu lông') || name.includes('ネジ') || name.includes('ốc vít')) {
                return 'Thép';
            }
            if (name.includes('ベアリング') || name.includes('vòng bi')) {
                return 'Thép hợp kim';
            }
            if (name.includes('抵抗') || name.includes('điện trở') || name.includes('コンデンサ') || name.includes('tụ điện')) {
                return 'Điện tử';
            }
            return 'Chưa xác định';
        }

        function getAdditionalSpecifications() {
            // Generate additional specification rows based on part type
            const specs = [];
            const materialType = getMaterialType();
            
            if (materialType === 'Thép') {
                specs.push(`
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Đường kính</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">6</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">mm</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Đường kính nominal</td>
                    </tr>
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Chiều dài</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">20</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">mm</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Chiều dài thân</td>
                    </tr>
                `);
            }
            
            return specs.join('');
        }

        function generateProductImages() {
            // Generate placeholder images for the product
            const images = [];
            for (let i = 1; i <= 6; i++) {
                images.push(`
                    <div class="border rounded-lg overflow-hidden hover:shadow-lg transition">
                        <img src="https://picsum.photos/seed/${currentPartCode}-${i}/300/200.jpg" 
                             alt="${currentPartData.name} - Hình ${i}" 
                             class="w-full h-48 object-cover">
                        <div class="p-3">
                            <p class="text-sm text-gray-600">Hình ${i}: ${getImageDescription(i)}</p>
                        </div>
                    </div>
                `);
            }
            return images.join('');
        }

        function getImageDescription(imageNumber) {
            const descriptions = [
                'Tổng quan sản phẩm',
                'Chi tiết đầu nối',
                'Kích thước thực tế',
                'Góc nhìn từ trên',
                'Góc nhìn từ bên',
                'Chi tiết bề mặt'
            ];
            return descriptions[imageNumber - 1] || 'Chi tiết sản phẩm';
        }

        function getRelatedParts() {
            // Get related parts from the same category
            if (!window.dataProcessor || !window.dataProcessor.processedData.partsTree) {
                return [];
            }
            
            return window.dataProcessor.processedData.partsTree
                .filter(part => part.category === currentPartData.category && part.code !== currentPartCode)
                .slice(0, 6);
        }

        function viewPartDetail(partCode) {
            window.location.href = `product-detail.html?code=${partCode}`;
        }

        function goBack() {
            window.history.back();
        }

        function printDetail() {
            window.print();
        }

        function exportDetail() {
            // Export part detail to PDF or CSV
            const dataStr = JSON.stringify(currentPartData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `part-detail-${currentPartCode}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function showError(message) {
            const contentArea = document.getElementById('detail-content-area');
            contentArea.innerHTML = `
                <div class="bg-white rounded-lg p-8 text-center">
                    <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                    <h3 class="text-xl font-semibold text-gray-800 mb-2">Lỗi</h3>
                    <p class="text-gray-600">${message}</p>
                    <button onclick="goBack()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        Quay lại
                    </button>
                </div>
            `;
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
