<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部品分類マスタ - 情報システム</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .hover-scale {
            transition: transform 0.2s ease;
        }
        
        .hover-scale:hover {
            transform: scale(1.05);
        }
        
        .tab-active {
            border-bottom: 3px solid #3B82F6;
            color: #3B82F6;
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Language Switcher -->
    <div class="language-switcher">
        <div class="bg-white rounded-lg shadow-lg p-2">
            <button onclick="switchLanguage('ja')" class="px-3 py-1 rounded bg-blue-500 text-white text-sm">
                🇯🇵 日本語
            </button>
            <button onclick="switchLanguage('vi')" class="px-3 py-1 rounded hover:bg-gray-100 text-sm">
                🇻🇳 Tiếng Việt
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-industry text-blue-600 text-2xl"></i>
                    <h1 class="text-2xl font-bold text-gray-800">部品分類マスタ情報システム</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleSearch()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-search mr-2"></i>検索
                    </button>
                    <button onclick="exportData()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-download mr-2"></i>エクスポート
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Bar (Hidden by default) -->
    <div id="searchBar" class="hidden bg-gray-100 border-b">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center space-x-4">
                <input type="text" id="searchInput" placeholder="部品名、分類、コードを検索..." 
                       class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="performSearch()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    <i class="fas fa-search"></i>
                </button>
                <button onclick="toggleSearch()" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition">
                    キャンセル
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg p-6 card-shadow hover-scale">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">総部品数</p>
                        <p class="text-2xl font-bold text-gray-800">15,234</p>
                    </div>
                    <i class="fas fa-cogs text-blue-500 text-3xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg p-6 card-shadow hover-scale">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">分類カテゴリ</p>
                        <p class="text-2xl font-bold text-gray-800">48</p>
                    </div>
                    <i class="fas fa-tags text-green-500 text-3xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg p-6 card-shadow hover-scale">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">最終更新</p>
                        <p class="text-lg font-bold text-gray-800">2022/7/26</p>
                    </div>
                    <i class="fas fa-clock text-orange-500 text-3xl"></i>
                </div>
            </div>
            <div class="bg-white rounded-lg p-6 card-shadow hover-scale">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">データシート</p>
                        <p class="text-2xl font-bold text-gray-800">11</p>
                    </div>
                    <i class="fas fa-file-alt text-purple-500 text-3xl"></i>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="bg-white rounded-lg shadow-md mb-6">
            <div class="border-b">
                <nav class="flex space-x-8 px-6">
                    <button onclick="switchTab('overview')" id="tab-overview" class="py-4 px-2 border-b-2 font-medium text-sm tab-active">
                        <i class="fas fa-home mr-2"></i>概要
                    </button>
                    <button onclick="switchTab('parts-tree')" id="tab-parts-tree" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-sitemap mr-2"></i>部品分類ツリー
                    </button>
                    <button onclick="switchTab('parts-list')" id="tab-parts-list" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-list mr-2"></i>部品一覧
                    </button>
                    <button onclick="switchTab('dictionary')" id="tab-dictionary" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-book mr-2"></i>DFK辞典
                    </button>
                    <button onclick="switchTab('reports')" id="tab-reports" class="py-4 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                        <i class="fas fa-chart-bar mr-2"></i>レポート
                    </button>
                </nav>
            </div>
        </div>

        <!-- Tab Content -->
        <div id="content-area">
            <!-- Overview Tab -->
            <div id="overview-content" class="tab-content fade-in">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-info-circle text-blue-500 mr-2"></i>システム概要
                        </h3>
                        <div class="space-y-4">
                            <div class="border-l-4 border-blue-500 pl-4">
                                <h4 class="font-semibold text-gray-700">部品分類マスタシステム</h4>
                                <p class="text-gray-600">製造部品の体系的な分類管理システム</p>
                            </div>
                            <div class="border-l-4 border-green-500 pl-4">
                                <h4 class="font-semibold text-gray-700">データ構成</h4>
                                <p class="text-gray-600">11シート、15,000+部品データ</p>
                            </div>
                            <div class="border-l-4 border-orange-500 pl-4">
                                <h4 class="font-semibold text-gray-700">最終更新日</h4>
                                <p class="text-gray-600">2022年7月26日 15:22</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <h3 class="text-xl font-bold mb-4 text-gray-800">
                            <i class="fas fa-layer-group text-green-500 mr-2"></i>データシート一覧
                        </h3>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer" onclick="loadSheet('sheet001')">
                                <span class="font-medium">記入方法</span>
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer" onclick="loadSheet('sheet002')">
                                <span class="font-medium">NSSOLとの履歴</span>
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer" onclick="loadSheet('sheet003')">
                                <span class="font-medium">部品分類ツリーマスタ</span>
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer" onclick="loadSheet('sheet004')">
                                <span class="font-medium">品名フリガナ索引</span>
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </div>
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded hover:bg-gray-100 cursor-pointer" onclick="loadSheet('sheet005')">
                                <span class="font-medium">品名文字列構成</span>
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="bg-white rounded-lg p-6 card-shadow mt-6">
                    <h3 class="text-xl font-bold mb-4 text-gray-800">
                        <i class="fas fa-bolt text-yellow-500 mr-2"></i>クイックアクション
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button onclick="quickAction('new-part')" class="bg-blue-500 text-white p-4 rounded-lg hover:bg-blue-600 transition">
                            <i class="fas fa-plus-circle text-2xl mb-2"></i>
                            <p class="text-sm">新規部品登録</p>
                        </button>
                        <button onclick="quickAction('bulk-import')" class="bg-green-500 text-white p-4 rounded-lg hover:bg-green-600 transition">
                            <i class="fas fa-file-import text-2xl mb-2"></i>
                            <p class="text-sm">一括インポート</p>
                        </button>
                        <button onclick="quickAction('generate-report')" class="bg-purple-500 text-white p-4 rounded-lg hover:bg-purple-600 transition">
                            <i class="fas fa-file-export text-2xl mb-2"></i>
                            <p class="text-sm">レポート生成</p>
                        </button>
                        <button onclick="quickAction('data-validation')" class="bg-orange-500 text-white p-4 rounded-lg hover:bg-orange-600 transition">
                            <i class="fas fa-check-circle text-2xl mb-2"></i>
                            <p class="text-sm">データ検証</p>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Other tabs will be loaded dynamically -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <p>&copy; 2022 部品分類マスタ情報システム. All rights reserved.</p>
                </div>
                <div class="flex space-x-6">
                    <a href="#" class="hover:text-blue-400 transition">
                        <i class="fas fa-question-circle mr-1"></i>ヘルプ
                    </a>
                    <a href="#" class="hover:text-blue-400 transition">
                        <i class="fas fa-envelope mr-1"></i>お問い合わせ
                    </a>
                    <a href="#" class="hover:text-blue-400 transition">
                        <i class="fas fa-cog mr-1"></i>設定
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 flex flex-col items-center">
            <div class="loading-spinner mb-4"></div>
            <p class="text-gray-700">データ読み込み中...</p>
        </div>
    </div>

    <script src="data-processor.js"></script>
    <script>
        // Language translations
        const translations = {
            ja: {
                title: '部品分類マスタ情報システム',
                search: '検索',
                export: 'エクスポート',
                totalParts: '総部品数',
                categories: '分類カテゴリ',
                lastUpdated: '最終更新',
                dataSheets: 'データシート',
                overview: '概要',
                partsTree: '部品分類ツリー',
                partsList: '部品一覧',
                dictionary: 'DFK辞典',
                reports: 'レポート'
            },
            vi: {
                title: 'Hệ thống Thông tin Phân loại Linh kiện',
                search: 'Tìm kiếm',
                export: 'Xuất dữ liệu',
                totalParts: 'Tổng số linh kiện',
                categories: 'Phân loại danh mục',
                lastUpdated: 'Cập nhật lần cuối',
                dataSheets: 'Sheet dữ liệu',
                overview: 'Tổng quan',
                partsTree: 'Cây phân loại linh kiện',
                partsList: 'Danh sách linh kiện',
                dictionary: 'Từ điển DFK',
                reports: 'Báo cáo'
            }
        };

        let currentLanguage = 'ja';

        function switchLanguage(lang) {
            currentLanguage = lang;
            updateLanguageUI();
            
            // Redirect to appropriate page
            if (lang === 'vi') {
                window.location.href = 'index-vi.html';
            } else {
                // Update current page with Japanese
                document.title = translations[lang].title;
            }
        }

        function updateLanguageUI() {
            // Update language switcher buttons
            const buttons = document.querySelectorAll('.language-switcher button');
            buttons.forEach(btn => {
                if (btn.textContent.includes('日本語') && currentLanguage === 'ja') {
                    btn.className = 'px-3 py-1 rounded bg-blue-500 text-white text-sm';
                } else if (btn.textContent.includes('Tiếng Việt') && currentLanguage === 'vi') {
                    btn.className = 'px-3 py-1 rounded bg-blue-500 text-white text-sm';
                } else {
                    btn.className = 'px-3 py-1 rounded hover:bg-gray-100 text-sm';
                }
            });
        }

        // Global variables
        let currentTab = 'overview';
        let searchData = [];
        let currentData = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            updateLanguageUI();
        });

        function initializeApp() {
            // Initialize data processor
            if (window.dataProcessor) {
                dataProcessor.processAllData().then(() => {
                    updateUIWithRealData();
                });
            }
            
            // Set up event listeners
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        }

        function updateUIWithRealData() {
            if (window.dataProcessor && window.dataProcessor.processedData.metadata) {
                const stats = window.dataProcessor.processedData.metadata;
                
                // Update statistics cards with real data
                const statCards = document.querySelectorAll('.text-2xl');
                if (statCards[0]) statCards[0].textContent = stats.totalParts.toLocaleString();
                if (statCards[1]) statCards[1].textContent = stats.totalCategories;
                if (statCards[3]) statCards[3].textContent = stats.sheetCount;
                
                console.log('UI updated with real data:', stats);
            }
        }

        function loadInitialData() {
            // Data is loaded by dataProcessor automatically
            console.log('Data initialization handled by dataProcessor');
        }

        function switchTab(tabName) {
            // Update tab styles
            document.querySelectorAll('[id^="tab-"]').forEach(tab => {
                tab.classList.remove('tab-active');
                tab.classList.add('text-gray-500');
            });
            
            document.getElementById(`tab-${tabName}`).classList.add('tab-active');
            document.getElementById(`tab-${tabName}`).classList.remove('text-gray-500');
            
            // Update content
            currentTab = tabName;
            loadTabContent(tabName);
        }

        function loadTabContent(tabName) {
            showLoading();
            
            const contentArea = document.getElementById('content-area');
            
            setTimeout(() => {
                switch(tabName) {
                    case 'overview':
                        contentArea.innerHTML = getOverviewContent();
                        break;
                    case 'parts-tree':
                        contentArea.innerHTML = getPartsTreeContent();
                        break;
                    case 'parts-list':
                        contentArea.innerHTML = getPartsListContent();
                        break;
                    case 'dictionary':
                        contentArea.innerHTML = getDictionaryContent();
                        break;
                    case 'reports':
                        contentArea.innerHTML = getReportsContent();
                        break;
                }
                hideLoading();
            }, 500);
        }

        function getOverviewContent() {
            return document.getElementById('overview-content').innerHTML;
        }

        function getPartsTreeContent() {
            // Use real data if available
            let treeData = [];
            if (window.dataProcessor && window.dataProcessor.processedData.partsTree) {
                treeData = window.dataProcessor.processedData.partsTree.slice(0, 10); // Show first 10 items
            }
            
            return `
                <div class="bg-white rounded-lg p-6 card-shadow fade-in">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-gray-800">
                            <i class="fas fa-sitemap text-blue-500 mr-2"></i>部品分類ツリー
                        </h3>
                        <button onclick="expandAllCategories()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                            <i class="fas fa-expand-alt mr-2"></i>すべて展開
                        </button>
                    </div>
                    
                    <div class="space-y-4">
                        ${treeData.length > 0 ? `
                            ${treeData.map(item => `
                                <div class="border rounded-lg p-4 hover:bg-gray-50">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="font-semibold text-gray-700">${item.category || '未分類'}</h4>
                                        <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">${item.code || 'N/A'}</span>
                                    </div>
                                    <div class="ml-4 space-y-2">
                                        <div class="flex items-center space-x-2">
                                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                            <span class="text-gray-600">${item.name || '名称不明'}</span>
                                            ${item.subcategory ? `<span class="text-gray-400 text-sm">(${item.subcategory})</span>` : ''}
                                        </div>
                                        ${item.specification ? `
                                            <div class="text-sm text-gray-500 ml-6">
                                                仕様: ${item.specification}
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        ` : `
                            <div class="text-center py-8">
                                <i class="fas fa-sitemap text-gray-300 text-4xl mb-4"></i>
                                <p class="text-gray-500">データ読み込み中...</p>
                                <p class="text-gray-400 text-sm mt-2">部品分類データが表示されます</p>
                            </div>
                        `}
                        
                        <!-- Static demo categories -->
                        <div class="border rounded-lg p-4">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-semibold text-gray-700">機械部品</h4>
                                <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">3,245 項目</span>
                            </div>
                            <div class="ml-4 space-y-2">
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                    <span class="text-gray-600">ねじ・ボルト類 (1,234)</span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                    <span class="text-gray-600">ベアリング類 (567)</span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                    <span class="text-gray-600">シール・パッキン類 (890)</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="border rounded-lg p-4">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-semibold text-gray-700">電子部品</h4>
                                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm">2,156 項目</span>
                            </div>
                            <div class="ml-4 space-y-2">
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                    <span class="text-gray-600">半導体 (789)</span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                    <span class="text-gray-600">コンデンサ (456)</span>
                                </div>
                                <div class="flex items-center space-x-2">
                                    <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                                    <span class="text-gray-600">抵抗器 (678)</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getPartsListContent() {
            // Use real data if available
            let listData = [];
            if (window.dataProcessor && window.dataProcessor.processedData.partsTree) {
                listData = window.dataProcessor.processedData.partsTree.slice(0, 20); // Show first 20 items
            }
            
            return `
                <div class="bg-white rounded-lg p-6 card-shadow fade-in">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-gray-800">
                            <i class="fas fa-list text-green-500 mr-2"></i>部品一覧
                        </h3>
                        <div class="flex space-x-2">
                            <select onchange="filterParts(this.value)" class="border rounded px-3 py-1 text-sm">
                                <option value="all">全カテゴリ</option>
                                <option value="mechanical">機械部品</option>
                                <option value="electronic">電子部品</option>
                                <option value="structural">構造部品</option>
                            </select>
                            <select onchange="changePageSize(this.value)" class="border rounded px-3 py-1 text-sm">
                                <option value="20">20件表示</option>
                                <option value="50">50件表示</option>
                                <option value="100">100件表示</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部品コード</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部品名</th>

                    setTimeout(() => {
                        const results = window.dataProcessor.searchParts(searchTerm);
                        displaySearchResults(results, searchTerm);
                        hideLoading();

                } else {

                        hideLoading();
                        displaySearchResults([], searchTerm);
                    }, 1000);
                }
            }
