<!DOCTYPE html>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .manufacturer-card {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        
        .manufacturer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }
        
        .certification-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 0.25rem;
        }
        
        .contact-method {
            transition: all 0.2s ease;
        }
        
        .contact-method:hover {
            background-color: #f3f4f6;
            transform: translateX(4px);
        }
        
        .product-highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        
        .location-map {
            height: 300px;
            background-color: #f3f4f6;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
        }
        
        .timeline-item {
            position: relative;
            padding-left: 2rem;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.5rem;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background-color: #3b82f6;
        }
        
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 0.375rem;
            top: 1.25rem;
            width: 0.0625rem;
            height: calc(100% - 0.5rem);
            background-color: #e5e7eb;
        }
        
        .timeline-item:last-child::after {
            display: none;
        }
    </style>
</head>

        <div id="partInfoHeader" class="bg-white rounded-lg p-6 shadow-lg mb-6">
            <!-- Content will be dynamically loaded -->
        </div>

        <!-- Manufacturers Grid -->

            <div class="flex justify-between items-center mb-6">

                    <i class="fas fa-factory text-blue-500 mr-2"></i>Nhà sản xuất uy tín
                </h2>
                <div class="flex space-x-2">

                        <option value="japan">Nhật Bản</option>
                        <option value="china">Trung Quốc</option>
                        <option value="germany">Đức</option>
                        <option value="usa">Mỹ</option>
                        <option value="korea">Hàn Quốc</option>

                        <option value="experience">Kinh nghiệm</option>
                        <option value="certification">Chứng nhận</option>
                        <option value="name">Tên A-Z</option>
                    </select>
                </div>
            </div>
            
            <div id="manufacturersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Manufacturer cards will be dynamically loaded -->
            </div>
        </div>

        <!-- Detailed Manufacturer Info -->
        <div id="manufacturerDetail" class="hidden bg-white rounded-lg p-6 shadow-lg mb-6">
            <!-- Detailed manufacturer info will be loaded here -->
        </div>

        <!-- Related Products -->
        <div class="bg-white rounded-lg p-6 shadow-lg">
            <h3 class="text-xl font-bold mb-4 text-gray-800">
                <i class="fas fa-link mr-2"></i>Sản phẩm liên quan từ các nhà sản xuất
            </h3>
            <div id="relatedProducts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Related products will be dynamically loaded -->
            </div>
        </div>
    </main>

        // Global variables
        let currentPartCode = '';
        let currentPartData = null;
        let manufacturers = [];
        let filteredManufacturers = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Get part code from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            currentPartCode = urlParams.get('code') || '';
            
            if (currentPartCode) {
                loadManufacturerInfo(currentPartCode);
            } else {
                showError('Không tìm thấy mã linh kiện');
            }
        });

        // Load manufacturer information
        async function loadManufacturerInfo(partCode) {
            showLoading();
            
            try {
                // Ensure data is processed
                if (!window.dataProcessor || !window.dataProcessor.processedData.partsTree.length) {
                    await window.dataProcessor.processAllData();
                }
                
                // Find part data
                currentPartData = window.dataProcessor.processedData.partsTree.find(
                    part => part.code === partCode
                );
                
                if (currentPartData) {
                    updatePartInfoHeader();
                    loadManufacturers();
                    loadRelatedProducts();
                } else {
                    showError(`Không tìm thấy linh kiện với mã: ${partCode}`);
                }
            } catch (error) {
                console.error('Error loading manufacturer info:', error);
                showError('Lỗi khi tải thông tin nhà sản xuất');
            } finally {
                hideLoading();
            }
        }

                            </span>

                                ${currentPartData.category || 'Chưa phân loại'}

                            Tìm nhà sản xuất uy tín cho linh kiện này với thông số kỹ thuật: ${currentPartData.specification || 'N/A'}

        // Determine part type
        function determinePartType(partData) {
            const name = (partData.name || '').toLowerCase();
            
            if (name.includes('ボルト') || name.includes('bu lông') || name.includes('ネジ') || name.includes('ốc vít')) {
                return 'bolt';
            } else if (name.includes('抵抗') || name.includes('điện trở')) {
                return 'resistor';
            } else if (name.includes('ベアリング') || name.includes('vòng bi')) {
                return 'bearing';
            }
            return 'generic';
        }

        }

        // Show manufacturer detail
        function showManufacturerDetail(manufacturerId) {
            const manufacturer = manufacturers.find(m => m.id === manufacturerId);
            if (!manufacturer) return;
            
            const detailDiv = document.getElementById('manufacturerDetail');
            detailDiv.innerHTML = `
                <div class="mb-6">
                    <button onclick="hideManufacturerDetail()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 transition mb-4">
                        <i class="fas fa-arrow-left mr-2"></i>Quay lại danh sách
                    </button>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2">
                            <div class="flex items-center space-x-4 mb-4">
                                <span class="text-4xl">${manufacturer.logo}</span>
                                <div>
                                    <h2 class="text-2xl font-bold text-gray-800">${manufacturer.name}</h2>
                                    <p class="text-gray-600">${manufacturer.countryName} • Thành lập ${manufacturer.established}</p>
                                </div>
                            </div>
                            
                            <div class="mb-6">
                                <h3 class="text-lg font-semibold mb-2">Giới thiệu công ty</h3>
                                <p class="text-gray-600 leading-relaxed">${manufacturer.description}</p>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <h3 class="text-lg font-semibold mb-2">Sản phẩm chính</h3>
                                    <ul class="space-y-2">
                                        ${manufacturer.products.map(product => `
                                            <li class="flex items-center text-gray-600">
                                                <i class="fas fa-check-circle text-green-500 mr-2"></i>
                                                ${product}
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                                
                                <div>
                                    <h3 class="text-lg font-semibold mb-2">Chứng nhận chất lượng</h3>
                                    <div class="space-y-2">
                                        ${manufacturer.certifications.map(cert => `
                                            <div class="flex items-center">
                                                <i class="fas fa-certificate text-blue-500 mr-2"></i>
                                                <span class="text-gray-600">${cert}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-6">
                                <h3 class="text-lg font-semibold mb-2">Lịch sử phát triển</h3>
                                <div class="space-y-4">
                                    <div class="timeline-item">
                                        <div class="font-semibold">${manufacturer.established}</div>
                                        <div class="text-sm text-gray-600">Thành lập công ty</div>
                                    </div>
                                    <div class="timeline-item">
                                        <div class="font-semibold">${manufacturer.established + 20}</div>
                                        <div class="text-sm text-gray-600">Mở rộng sản xuất quốc tế</div>
                                    </div>
                                    <div class="timeline-item">
                                        <div class="font-semibold">${manufacturer.established + 40}</div>
                                        <div class="text-sm text-gray-600">Đạt chứng nhận ISO 9001</div>
                                    </div>
                                    <div class="timeline-item">
                                        <div class="font-semibold">${manufacturer.established + 60}</div>
                                        <div class="text-sm text-gray-600">Trở thành nhà sản xuất hàng đầu</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <div class="bg-gray-50 rounded-lg p-6 mb-6">
                                <h3 class="text-lg font-semibold mb-4">Thông tin liên hệ</h3>
                                <div class="space-y-3">
                                    <div class="contact-method flex items-center p-3 bg-white rounded">
                                        <i class="fas fa-globe text-blue-500 mr-3"></i>
                                        <div>
                                            <div class="text-sm text-gray-500">Website</div>
                                            <a href="${manufacturer.contact.website}" target="_blank" class="text-blue-600 hover:underline">
                                                ${manufacturer.contact.website}
                                            </a>
                                        </div>
                                    </div>
                                    
                                    <div class="contact-method flex items-center p-3 bg-white rounded">
                                        <i class="fas fa-envelope text-green-500 mr-3"></i>
                                        <div>
                                            <div class="text-sm text-gray-500">Email</div>
                                            <div class="text-gray-700">${manufacturer.contact.email}</div>
                                        </div>
                                    </div>
                                    
                                    <div class="contact-method flex items-center p-3 bg-white rounded">
                                        <i class="fas fa-phone text-purple-500 mr-3"></i>
                                        <div>
                                            <div class="text-sm text-gray-500">Điện thoại</div>
                                            <div class="text-gray-700">${manufacturer.contact.phone}</div>
                                        </div>
                                    </div>
                                    
                                    <div class="contact-method flex items-center p-3 bg-white rounded">
                                        <i class="fas fa-map-marker-alt text-red-500 mr-3"></i>
                                        <div>
                                            <div class="text-sm text-gray-500">Địa chỉ</div>
                                            <div class="text-gray-700">${manufacturer.contact.address}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-blue-50 rounded-lg p-6 mb-6">
                                <h3 class="text-lg font-semibold mb-4">Số liệu kinh doanh</h3>
                                <div class="space-y-3">
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Nhân viên:</span>
                                        <span class="font-semibold">${manufacturer.employees.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Doanh thu:</span>
                                        <span class="font-semibold">${manufacturer.revenue}</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Kinh nghiệm:</span>
                                        <span class="font-semibold">${manufacturer.experience} năm</span>
                                    </div>
                                    <div class="flex justify-between">
                                        <span class="text-gray-600">Đánh giá:</span>
                                        <div class="flex items-center">
                                            <i class="fas fa-star text-yellow-400 mr-1"></i>
                                            <span class="font-semibold">${manufacturer.reputation}/5.0</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="space-y-3">
                                <button onclick="contactManufacturer('${manufacturer.id}')" class="w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">
                                    <i class="fas fa-envelope mr-2"></i>Gửi yêu cầu báo giá
                                </button>
                                <button onclick="visitWebsite('${manufacturer.contact.website}')" class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                                    <i class="fas fa-external-link-alt mr-2"></i>Truy cập website
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            detailDiv.classList.remove('hidden');
            detailDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // Hide manufacturer detail
        function hideManufacturerDetail() {
            const detailDiv = document.getElementById('manufacturerDetail');
            detailDiv.classList.add('hidden');
        }

        // Filter manufacturers
        function filterManufacturers(country) {
            if (country === 'all') {
                filteredManufacturers = [...manufacturers];
            } else {
                filteredManufacturers = manufacturers.filter(m => m.country === country);
            }
            displayManufacturers();
        }

        // Sort manufacturers
        function sortManufacturers(sortBy) {
            switch(sortBy) {
                case 'reputation':
                    filteredManufacturers.sort((a, b) => b.reputation - a.reputation);
                    break;
                case 'experience':
                    filteredManufacturers.sort((a, b) => b.experience - a.experience);
                    break;
                case 'certification':
                    filteredManufacturers.sort((a, b) => b.certifications.length - a.certifications.length);
                    break;
                case 'name':
                    filteredManufacturers.sort((a, b) => a.name.localeCompare(b.name));
                    break;
            }
            displayManufacturers();
        }

        // Load related products
        function loadRelatedProducts() {
            const relatedDiv = document.getElementById('relatedProducts');
            const relatedParts = getRelatedParts();
            
            const productsHTML = relatedParts.map(part => `
                <div class="border rounded-lg p-4 hover:shadow-lg transition cursor-pointer" onclick="viewPartDetail('${part.code}')">
                    <div class="flex items-center space-x-2 mb-2">
                        <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium">
                            ${part.code}
                        </span>
                        <span class="text-xs text-gray-500">${part.category}</span>
                    </div>
                    <h4 class="font-semibold text-gray-800 mb-1 line-clamp-2">
                        ${part.name}
                    </h4>
                    <p class="text-sm text-gray-600 line-clamp-2">
                        ${part.specification || 'Không có thông số'}
                    </p>
                    <div class="mt-2">
                        <button onclick="findManufacturers('${part.code}')" class="text-blue-600 hover:text-blue-900 text-sm">
                            <i class="fas fa-industry mr-1"></i>Tìm nhà sản xuất
                        </button>
                    </div>
                </div>
            `).join('');
            
            relatedDiv.innerHTML = productsHTML;
        }

        function getRelatedParts() {
            if (!window.dataProcessor || !window.dataProcessor.processedData.partsTree) {
                return [];
            }
            
            return window.dataProcessor.processedData.partsTree
                .filter(part => part.category === currentPartData.category && part.code !== currentPartCode)
                .slice(0, 8);
        }

        function viewPartDetail(partCode) {
            window.open(`product-detail.html?code=${partCode}`, '_blank');
        }

        function findManufacturers(partCode) {
            window.open(`manufacturer-info.html?code=${partCode}`, '_blank');
        }

        function contactManufacturer(manufacturerId) {
            const manufacturer = manufacturers.find(m => m.id === manufacturerId);
            if (manufacturer) {
                alert(`Đang mở form liên hệ với ${manufacturer.name}...`);
            }
        }

        function visitWebsite(url) {
            window.open(url, '_blank');
        }

        function goBack() {
            window.history.back();
        }

        function exportManufacturerInfo() {
            const dataStr = JSON.stringify(filteredManufacturers, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `manufacturers-${currentPartCode}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function showError(message) {
            const gridDiv = document.getElementById('manufacturersGrid');
            gridDiv.innerHTML = `
                <div class="col-span-full text-center py-8">
                    <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                    <h3 class="text-xl font-semibold text-gray-800 mb-2">Lỗi</h3>
                    <p class="text-gray-600">${message}</p>
                    <button onclick="goBack()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        Quay lại
                    </button>
                </div>
            `;
        }

        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
